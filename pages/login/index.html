<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Вход — YUEdu</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-header">
        <div class="logo-block">
          <img src="../../assets/img/logo.png" alt="YUEdu" class="logo-img-sm">
          <span class="logo-text">YUEdu</span>
        </div>
        <h1>Добро пожаловать</h1>
        <p>Войдите в свой аккаунт</p>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="example@university.kz" autofocus>
      </div>

      <div class="form-group">
        <label for="password">
          Пароль
          <a href="#" class="forgot-link" onclick="return false;">Забыли пароль?</a>
        </label>
        <div class="input-eye">
          <input type="password" id="password" placeholder="Введите пароль">
          <button type="button" class="eye-btn" onclick="togglePass()">&#128065;</button>
        </div>
      </div>

      <button class="btn-primary" onclick="handleLogin()">Войти</button>

      <p class="auth-switch">Нет аккаунта? <a href="../register/">Зарегистрироваться</a></p>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
